name: Package Skills
on:
  push:
    branches: [main]
    paths: ['skills/**']
  release:
    types: [published]
jobs:
  # On push to main: package every skill so the latest <name>.skill artifacts
  # stay available. Does not touch releases.
  package-all:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package all skills
        run: |
          mkdir -p dist
          for skill_dir in skills/*/; do
            name=$(basename "$skill_dir")
            tar -czf "dist/${name}.skill" -C skills "$name"
          done
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: skills
          path: dist/

  # On a published release: the tag is <skill-name>/v<version>. Package and
  # upload ONLY that skill, then promote its [Unreleased] CHANGELOG section.
  release-skill:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Parse skill + version from tag
        id: parse
        run: |
          TAG="${{ github.event.release.tag_name }}"
          case "$TAG" in
            */v*) ;;
            *) echo "::error::Tag '$TAG' must be <skill-name>/v<version>"; exit 1 ;;
          esac
          SKILL_NAME="${TAG%/*}"
          VERSION="${TAG##*/}"; VERSION="${VERSION#v}"
          [ -f "skills/$SKILL_NAME/SKILL.md" ] || { echo "::error::skills/$SKILL_NAME/SKILL.md not found"; exit 1; }
          echo "skill=$SKILL_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Package the released skill
        run: bash scripts/package-skill.sh "${{ steps.parse.outputs.skill }}" "${{ steps.parse.outputs.version }}"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ steps.parse.outputs.skill }}.skill
            dist/${{ steps.parse.outputs.skill }}-${{ steps.parse.outputs.version }}.skill
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Promote skill CHANGELOG
        run: |
          SKILL="${{ steps.parse.outputs.skill }}"
          VERSION="${{ steps.parse.outputs.version }}"
          CL="skills/$SKILL/CHANGELOG.md"
          [ -f "$CL" ] || { echo "No $CL; skipping promotion."; exit 0; }
          DATE="$(date -u +%Y-%m-%d)"
          sed -i "s/## \[Unreleased\]/## [${VERSION}] - ${DATE}/" "$CL"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CL"
          git diff --cached --quiet || git commit -m "chore: promote ${SKILL} CHANGELOG for v${VERSION}"
          git push origin main
